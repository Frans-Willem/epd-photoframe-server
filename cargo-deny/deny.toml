# cargo-deny configuration for epd-photoframe-server.
#
# Run with `cargo deny check --config cargo-deny/deny.toml`. The licence
# check is the load-bearing one: this crate is AGPL-3.0-only, so every
# transitive dependency must be under a licence that combines cleanly
# with AGPL-3.0.

[licenses]
# Permissive licences (MIT, Apache-2.0, BSD, ISC, etc.) all combine
# with AGPL-3.0. GPL-3.0-or-later is explicitly compatible with
# AGPL-3.0 via §13 of GPL-3.0 (covers the `epd-dither` git dep).
# AGPL-3.0-only is here for this crate's own licence. Public-domain
# dedications (CC0, Unlicense) and the data licences
# (CDLA-Permissive-2.0 used by `webpki-roots`, Unicode-3.0 used by
# icu4x) round out what's currently in the dep tree.
#
# `NCSA` covers `libfuzzer-sys` (transitive via image → ravif → rav1e);
# the NCSA / "University of Illinois" licence is permissive (MIT-style)
# and FSF-approved as Free Software, so it combines fine with AGPL.
allow = [
    "AGPL-3.0-only",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "GPL-3.0-or-later",
    "ISC",
    "MIT",
    "NCSA",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = ["https://github.com/Frans-Willem/epd-dither"]

# `cargo deny check licenses` is the load-bearing check this config
# is tuned for. `cargo deny check advisories` will surface RustSec
# advisories (currently unmaintained transitive deps and a couple of
# rustls/webpki vulns) — fixing or ignoring those is a separate
# concern from licence compatibility, so the [advisories] section is
# left at its defaults.
