[[screens]]
name = "living-room"
width = 800
height = 480
# Create a public shared album in Google Photos, copy the share link here.
# Both photos.app.goo.gl short links and photos.google.com/share/... links work.
share_url = "https://photos.app.goo.gl/YOUR_SHARE_ID"
# How Google should resize the photo to fit the screen.
#   crop        — centre-crop to width × height
#   smart-crop  — content-aware crop to width × height
#   resize      — stretch to width × height, ignoring aspect ratio
#   contain     — fit within width × height, preserving aspect ratio
fit = "crop"
# What fills the area around the photo if the returned image ends up smaller
# than the screen (mainly used with `contain`).
#   "blur"            — a blurred cover-sized copy of the photo
#   "#RRGGBB"         — a solid HTML colour (default: "#FFFFFF")
#   "rgb(r,g,b)"      — a solid colour, 0-255 components
#   "rgba(r,g,b,a)"   — same, with CSS float alpha (a in [0.0, 1.0]) — alpha ignored here
background = "#FFFFFF"
# IANA timezone name, used for rotation and the infobox clock. Defaults to
# the system timezone.
# timezone = "Europe/Amsterdam"
# When the screen should reshuffle (new seed, cursor reset to the first
# photo of the new shuffle). Pick ONE syntax — Quartz-style 7-field cron:
#   sec min hour day-of-month month day-of-week [year]
# or a cron-lingo natural-language phrase (see the bedroom screen below).
# Omit the `rotate` key entirely to keep a single shuffle until restart.
# Requests with ?action=next / ?action=previous step the cursor within the
# current shuffle; ?action=refresh is a no-op; a plain GET (power-on or
# timer wake) re-renders the current photo. Every response carries a
# Refresh header pointing the device at its next wake-up.
rotate.cron = "0 0 2,14 * * *"
# How much later than the next scheduled rotation the device is instructed
# to fetch the new image. Absorbs device-clock drift (the ESP32-S3 RTC can
# be several percent off) so a single scheduled rotation doesn't turn into
# two wakes when the device fires slightly early. Accepts humantime strings
# like "30s", "15m", "1h 30m". Defaults to 0.
wake_delay = "1h"

# Optional info overlay — day of week, date, weather.
[screens.infobox]
position = "bottom-left"       # top-left | top | top-right | left | right | bottom-left | bottom | bottom-right
background = "rgba(255, 255, 255, 0.8)"
foreground = "#000000"
latitude = 52.37
longitude = 4.90
units = "metric"               # metric (°C, km/h) | imperial (°F, mph)

# Optional battery indicator. Renders only when the request includes a
# `battery_pct` query parameter (the device sends it; the server doesn't
# store readings between requests). The indicator has no opaque box behind
# it: only the inside of the battery cell is filled (`empty_color` for the
# depleted portion, `foreground` for the charged portion); text floats
# directly on the photo.
[screens.battery_indicator]
position = "top-right"
foreground = "#FFFFFF"               # outline + nub + filled portion + text
empty_color = "rgba(0, 0, 0, 0.4)"   # depleted portion of the battery cell
style = "both"                       # icon | text | both
# Optional low-charge fill colours. The lowest-`below` matching entry wins,
# so list them in any order. Thresholds and colours below mirror Android's
# defaults — config_lowBatteryWarningLevel = 20 and
# config_criticalBatteryWarningLevel = 10 from core/res/res/values/config.xml,
# with the dark-theme Warning (#F29900) and Error (#C5221F) colours from
# BatteryDrawableState.kt's ColorProfile.
thresholds = [
    { below = 20, color = "#F29900" },
    { below = 10, color = "#C5221F" },
]

[screens.dither]
noise = "ign"                   # none | bayer | bayer:N | ign | white
strategy = "octahedron-closest" # octahedron-closest | octahedron-furthest | naive-mix | naive-dominant
diffuse = "floyd-steinberg"     # none | floyd-steinberg | jarvis-judice-and-ninke | atkinson | sierra
dither_palette = "spectra6"     # naive | spectra6 | epdoptimize
output_palette = "spectra6"

[[screens]]
name = "bedroom"
width = 600
height = 448
share_url = "https://photos.app.goo.gl/ANOTHER_SHARE_ID"
fit = "contain"
background = "blur"
# Natural-language schedule (cron-lingo). See the crate docs for the full
# grammar; typical forms: "at 6 AM", "at 7:30 AM and 7:30 PM",
# "at 6 AM on Mondays, Wednesdays and Fridays".
rotate.natural = "at 6 AM and 6 PM"

[screens.dither]
noise = "bayer:4"
strategy = "octahedron-furthest"
diffuse = "atkinson"
dither_palette = "epdoptimize"
output_palette = "spectra6"
