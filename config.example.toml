# Address the HTTP server binds to. Optional; defaults to "0.0.0.0:3000".
# Accepts any host:port that `SocketAddr::parse` accepts (IPv4, IPv6, etc.).
# listen = "0.0.0.0:3000"

# Optional. When present, screens with any `publish_*` flag will report
# device-supplied query-string sensor values (battery, temperature, humidity)
# to MQTT, and a Home Assistant discovery config is published once on startup
# for each enabled sensor. Drop the section to disable MQTT entirely.
# [mqtt]
# broker = "homeassistant.local"
# port = 1883                                # default
# username = "epd"
# password = "secret"
# client_id = "epd-photoframe-server"        # default
# discovery_prefix = "homeassistant"         # default
# state_prefix = "epd-photoframe"            # default

[[screens]]
name = "living-room"
# Optional human-readable label published over MQTT (used as the Home
# Assistant device name and prefixed onto each entity name). Defaults to
# `name` — set this when the URL slug isn't a nice label.
mqtt_name = "Photoframe Livingroom"
width = 800
height = 480
# Create a public shared album in Google Photos, copy the share link here.
# Both photos.app.goo.gl short links and photos.google.com/share/... links work.
share_url = "https://photos.app.goo.gl/YOUR_SHARE_ID"
# How Google should resize the photo to fit the screen.
#   crop        — centre-crop to width × height
#   smart-crop  — content-aware crop to width × height
#   resize      — stretch to width × height, ignoring aspect ratio
#   contain     — fit within width × height, preserving aspect ratio
fit = "crop"
# What fills the area around the photo if the returned image ends up smaller
# than the screen (mainly used with `contain`).
#   "blur"            — a blurred cover-sized copy of the photo
#   "#RRGGBB"         — a solid HTML colour (default: "#FFFFFF")
#   "rgb(r,g,b)"      — a solid colour, 0-255 components
#   "rgba(r,g,b,a)"   — same, with CSS float alpha (a in [0.0, 1.0]) — alpha ignored here
background = "#FFFFFF"
# IANA timezone name, used for rotation and the infobox clock. Defaults to
# the system timezone.
# timezone = "Europe/Amsterdam"
# BCP-47 locale tag for the infobox. Controls the language of weekday and
# month names AND the date pattern: "en-US" gives "May 2, 2026" / "Sat",
# "en-GB" (default) gives "2 May 2026" / "Sat", "nl-NL" gives "2 mei 2026"
# / "za", "de-DE" gives "2. Mai 2026" / "Sa".
# locale = "nl-NL"
# When the screen should reshuffle (new seed, cursor reset to the first
# photo of the new shuffle). Pick ONE syntax — Quartz-style 7-field cron:
#   sec min hour day-of-month month day-of-week [year]
# or a cron-lingo natural-language phrase (see the bedroom screen below).
# Omit the `rotate` key entirely to keep a single shuffle until restart.
# Requests with ?action=next / ?action=previous step the cursor within the
# current shuffle; ?action=refresh drops the cached share-page contents and
# re-scrapes before rendering, so a freshly added/removed photo shows up
# without waiting for the next scheduled rotation; a plain GET (power-on
# or timer wake) re-renders the current photo. Every response carries a
# Refresh header pointing the device at its next wake-up.
rotate.cron = "0 0 2,14 * * *"
# How much later than the next scheduled rotation the device is instructed
# to fetch the new image. Absorbs device-clock drift (the ESP32-S3 RTC can
# be several percent off) so a single scheduled rotation doesn't turn into
# two wakes when the device fires slightly early. Accepts humantime strings
# like "30s", "15m", "1h 30m". Defaults to 0.
wake_delay = "1h"
# How long to ask the device to wait before retrying after a failed render.
# On a soft failure (photo or weather fetch fails) the response is still a
# valid PNG (placeholder + diagnostic text); on a hard failure (dither
# panic) it's HTTP 500 text/plain. Either way the Refresh header points at
# `error_refresh` from now, clamped against the device's normal next-fetch
# target (`next_rotation + wake_delay`) so it never extends past one.
# Defaults to "1h".
error_refresh = "1h"
# Per-screen MQTT publish list. Each entry creates one or more Home Assistant
# sensors (all grouped under one Home Assistant device per screen). Defaults
# to ["battery", "last_seen"]. Available values:
#   battery     — both `?battery_mv=` and `?battery_pct=` (two sensors)
#   temperature — `?temp_c=` as a temperature sensor (°C)
#   humidity    — `?humidity_pct=` as a humidity sensor (%)
#   power       — `?power=battery|charging|full|fault` as an enum sensor
#   last_seen   — server-side request timestamp (Home Assistant `timestamp`
#                 device class)
publish = ["battery", "temperature", "humidity", "power", "last_seen"]

# Optional info overlay — day of week, date, weather. The header (date /
# day text) and weather panel are configured independently; setting both
# `*_layout` keys to "none" suppresses the overlay entirely.
[screens.infobox]
position = "bottom-left"       # top-left | top | top-right | left | right | bottom-left | bottom | bottom-right
background = "rgba(255, 255, 255, 0.8)"
foreground = "#000000"
latitude = 52.37
longitude = 4.90
units = "metric"               # metric (°C, km/h) | imperial (°F, mph)
# Header section above the weather. Word and date format depend on `locale`:
#   none      — no header
#   day       — full weekday name, e.g. "Tuesday"
#   date      — locale-formatted date, e.g. "5 May 2026"
#   day-date  — both lines, day on top  (default)
header_layout = "day-date"
# Weather section. The multi-day variants need a tall display to fit
# legibly — recommended for E1004 (1200×1600) only; on E1001 / E1002 the
# row of compact cells is too small to read.
#   none           — no weather (skips the Open-Meteo fetch entirely)
#   one            — today's icon + min–max range, single line  (default)
#   one-plus-four  — today's line on top, then a row of 4 future-day cells
#   five           — a row of 5 compact day-cells starting with today
weather_layout = "one"

# Optional battery indicator. Renders only when the request includes a
# `battery_pct` query parameter (the device sends it; the server doesn't
# store readings between requests). The indicator has no opaque box behind
# it: only the inside of the battery cell is filled (`empty_color` for the
# depleted portion, `foreground` for the charged portion); text floats
# directly on the photo.
[screens.battery_indicator]
position = "top-right"
foreground = "#FFFFFF"               # outline + nub + filled portion + text
empty_color = "rgba(0, 0, 0, 0.4)"   # depleted portion of the battery cell
style = "both"                       # icon | text | both
# Optional low-charge fill colours. The lowest-`below` matching entry wins,
# so list them in any order. Thresholds and colours below mirror Android's
# defaults — config_lowBatteryWarningLevel = 20 and
# config_criticalBatteryWarningLevel = 10 from core/res/res/values/config.xml,
# with the dark-theme Warning (#F29900) and Error (#C5221F) colours from
# BatteryDrawableState.kt's ColorProfile.
thresholds = [
    { below = 20, color = "#F29900" },
    { below = 10, color = "#C5221F" },
]

[screens.dither]
noise = "ign"                   # none | bayer | bayer:N | ign | white
# Decomposition strategy.
#   octahedron-closest / octahedron-furthest — 6-colour palettes that form a
#       regular convex octahedron (e.g. spectra6, naive)
#   naive-mix / naive-dominant — arbitrary 6-colour palettes (e.g. epdoptimize)
#   grayscale — 1-D grayscale, no spread; needs a `grayscale*` dither_palette
#   gray-pure-spread:<r>  — asymmetric mean-preserving spread, r in [0, 1]
#   gray-offset-blend:<r> — symmetric blend of bracket decompositions of
#       input ± r/2 (mean-preserving), r in [0, 1]
strategy = "octahedron-closest"
diffuse = "floyd-steinberg"     # none | floyd-steinberg | jarvis-judice-and-ninke | atkinson | sierra
# Palettes. `dither_palette` is what the dither targets; `output_palette` is
# what gets written into the PNG palette table. Naming one mirrors it to the
# other; naming neither falls back to `spectra6` for colour strategies and
# `grayscale4` for `grayscale` / `gray-*:*`. Set both explicitly only when
# they should differ — e.g. dithering against `epdoptimize`'s wider gamut
# while declaring the PNG palette as the panel's actual `spectra6` colours.
#   naive | spectra6 | epdoptimize | grayscale2 | grayscale4 | grayscale16
# Measured Spectra 6 variants from the upstream calibration session, keyed
# by illuminant (D50 / D65) and BPC strength. `spectra6` is an alias for
# `spectra6-d65-bpc80-adjusted` (closest to the legacy phone-camera
# placeholder); for panel-realistic chromaticity without clipping prefer
# `*-adjusted` (BPC at α_max).
#   spectra6-d50  | spectra6-d50-adjusted
#   spectra6-d50-bpc{50,75,80,90,100}-adjusted
#   spectra6-d65  | spectra6-d65-adjusted
#   spectra6-d65-bpc{50,75,80,90,100}-adjusted
dither_palette = "spectra6"

[[screens]]
name = "bedroom"
width = 600
height = 448
share_url = "https://photos.app.goo.gl/ANOTHER_SHARE_ID"
fit = "contain"
background = "blur"
# Natural-language schedule (cron-lingo). See the crate docs for the full
# grammar; typical forms: "at 6 AM", "at 7:30 AM and 7:30 PM",
# "at 6 AM on Mondays, Wednesdays and Fridays".
rotate.natural = "at 6 AM and 6 PM"

[screens.dither]
noise = "bayer:4"
strategy = "octahedron-furthest"
diffuse = "atkinson"
dither_palette = "spectra6-d65-bpc100-adjusted"
