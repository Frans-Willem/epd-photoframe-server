[[screens]]
name = "living-room"
width = 800
height = 480
# Create a public shared album in Google Photos, copy the share link here.
# Both photos.app.goo.gl short links and photos.google.com/share/... links work.
share_url = "https://photos.app.goo.gl/YOUR_SHARE_ID"
# How Google should resize the photo to fit the screen.
#   crop        — centre-crop to width × height
#   smart-crop  — content-aware crop to width × height
#   resize      — stretch to width × height, ignoring aspect ratio
#   contain     — fit within width × height, preserving aspect ratio
fit = "crop"
# What fills the area around the photo if the returned image ends up smaller
# than the screen (mainly used with `contain`).
#   "blur"     — a blurred cover-sized copy of the photo
#   "#RRGGBB"  — a solid HTML colour (default: "#FFFFFF")
background = "#FFFFFF"

[screens.dither]
noise = "ign"                   # none | bayer | bayer:N | ign | white
strategy = "octahedron-closest" # octahedron-closest | octahedron-furthest | naive-mix | naive-dominant
diffuse = "floyd-steinberg"     # none | floyd-steinberg | jarvis-judice-and-ninke | atkinson | sierra
dither_palette = "spectra6"     # naive | spectra6 | epdoptimize
output_palette = "spectra6"

[[screens]]
name = "bedroom"
width = 600
height = 448
share_url = "https://photos.app.goo.gl/ANOTHER_SHARE_ID"
fit = "contain"
background = "blur"

[screens.dither]
noise = "bayer:4"
strategy = "octahedron-furthest"
diffuse = "atkinson"
dither_palette = "epdoptimize"
output_palette = "spectra6"
